<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome Back</title>

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient-start: #1a1a3e;
            --bg-gradient-mid: #1e2a5a;
            --bg-gradient-end: #2d1b4e;
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #c5c5e0;
            --text-muted: #9a9abf;
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.2);
            --input-focus-border: #6c8cff;
            --input-text: #ffffff;
            --input-placeholder: #8888b0;
            --btn-primary: #4f6ef6;
            --btn-primary-hover: #3d5ce5;
            --btn-google-bg: rgba(255, 255, 255, 0.1);
            --btn-google-hover: rgba(255, 255, 255, 0.18);
            --btn-google-text: #e0e0f0;
            --error-red: #ff5e7a;
            --divider-line: rgba(255, 255, 255, 0.2);
            --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.4), 0 4px 20px rgba(0, 0, 0, 0.25);
            --shadow-card-hover: 0 25px 70px rgba(0, 0, 0, 0.5), 0 6px 25px rgba(0, 0, 0, 0.3);
            --radius-card: 20px;
            --radius-input: 12px;
            --radius-btn: 12px;
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e 25%, #1e2a5a 50%, #2d1b4e 75%, #1a0a2e);
            background-size: 400% 400%;
            animation: gradientShift 18s ease infinite;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background animated orbs */
        body::before {
            content: '';
            position: fixed;
            top: -15%;
            left: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 130, 255, 0.25) 0%, transparent 70%);
            animation: orbFloat1 14s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -12%;
            right: -8%;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(160, 100, 255, 0.25) 0%, transparent 70%);
            animation: orbFloat2 16s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 50% 0%;
            }
            50% {
                background-position: 100% 50%;
            }
            75% {
                background-position: 50% 100%;
            }
        }

        @keyframes orbFloat1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(80px, -60px) scale(1.15);
            }
            66% {
                transform: translate(-40px, 50px) scale(0.9);
            }
        }

        @keyframes orbFloat2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-70px, 50px) scale(1.1);
            }
            66% {
                transform: translate(50px, -40px) scale(0.85);
            }
        }

        /* Card Container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: var(--radius-card);
            padding: 44px 36px 36px;
            box-shadow: var(--shadow-card);
            transition: box-shadow var(--transition-speed) ease,
                border-color var(--transition-speed) ease;
            position: relative;
        }

        .login-card:hover {
            box-shadow: var(--shadow-card-hover);
            border-color: rgba(255, 255, 255, 0.22);
        }

        /* Subtle inner glow at top */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 2px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.35),
                    rgba(180, 200, 255, 0.5),
                    rgba(255, 255, 255, 0.35),
                    transparent);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .icon-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-header .icon-circle svg {
            width: 26px;
            height: 26px;
            stroke: #c5cfff;
            fill: none;
            stroke-width: 2;
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            margin-bottom: 4px;
            line-height: 1.25;
        }

        .login-header .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon svg {
            width: 18px;
            height: 18px;
            stroke: #9999c0;
            fill: none;
            stroke-width: 2;
            transition: stroke var(--transition-speed) ease;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--input-text);
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: var(--radius-input);
            outline: none;
            transition: all var(--transition-speed) ease;
            letter-spacing: 0.2px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .input-wrapper input::placeholder {
            color: var(--input-placeholder);
            font-weight: 300;
        }

        .input-wrapper input:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 4px rgba(108, 140, 255, 0.12);
            background: rgba(255, 255, 255, 0.12);
        }

        .input-wrapper input:focus~.input-icon svg,
        .input-wrapper input:focus+.input-icon svg {
            stroke: #b0c4ff;
        }

        /* Password toggle button */
        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background var(--transition-speed) ease;
            color: #9999c0;
        }

        .toggle-password:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #c5cfff;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            transition: stroke var(--transition-speed) ease;
        }

        /* Error message */
        .error-message {
            font-size: 0.78rem;
            color: var(--error-red);
            margin-top: 5px;
            display: none;
            align-items: center;
            gap: 5px;
            font-weight: 500;
            letter-spacing: 0.1px;
        }

        .error-message.visible {
            display: flex;
            animation: shakeError 0.45s ease;
        }

        .error-message svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        @keyframes shakeError {
            0%,
            100% {
                transform: translateX(0);
            }
            15% {
                transform: translateX(-6px);
            }
            30% {
                transform: translateX(6px);
            }
            45% {
                transform: translateX(-4px);
            }
            60% {
                transform: translateX(4px);
            }
            75% {
                transform: translateX(-2px);
            }
            90% {
                transform: translateX(2px);
            }
        }

        /* Row: Remember me + Forgot password */
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .remember-me input[type="checkbox"] {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-speed) ease;
            flex-shrink: 0;
        }

        .custom-checkbox svg {
            width: 12px;
            height: 12px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 3;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease;
        }

        .remember-me input:checked+.custom-checkbox {
            background: var(--btn-primary);
            border-color: var(--btn-primary);
            box-shadow: 0 0 10px rgba(79, 110, 246, 0.4);
        }

        .remember-me input:checked+.custom-checkbox svg {
            opacity: 1;
            transform: scale(1);
        }

        .forgot-link {
            font-size: 0.85rem;
            color: #b0c4ff;
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition-speed) ease;
            letter-spacing: 0.2px;
        }

        .forgot-link:hover {
            color: #d0daff;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Login button */
        .btn-login {
            width: 100%;
            padding: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background: var(--btn-primary);
            border: none;
            border-radius: var(--radius-btn);
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all var(--transition-speed) ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(79, 110, 246, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: var(--btn-primary-hover);
            box-shadow: 0 10px 30px rgba(79, 110, 246, 0.5);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(79, 110, 246, 0.3);
            transition: all 0.1s ease;
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.85;
        }

        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .btn-login.loading .spinner {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        .btn-login.loading::after {
            content: 'Memproses...';
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 24px 0;
        }

        .divider span {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: 0.5px;
            text-transform: lowercase;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--divider-line);
            border-radius: 1px;
        }

        /* Google button */
        .btn-google {
            width: 100%;
            padding: 13px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--btn-google-text);
            background: var(--btn-google-bg);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-btn);
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: all var(--transition-speed) ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .btn-google:hover {
            background: var(--btn-google-hover);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-1px);
        }

        .btn-google:active {
            transform: translateY(0);
            transition: all 0.1s ease;
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Footer link */
        .login-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 0.88rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        .login-footer a {
            color: #b0c4ff;
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-speed) ease;
        }

        .login-footer a:hover {
            color: #d0daff;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px 26px;
                border-radius: 16px;
            }

            .login-header h1 {
                font-size: 1.45rem;
            }

            .login-header .subtitle {
                font-size: 0.85rem;
            }

            .form-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .forgot-link {
                align-self: flex-end;
            }

            .btn-login,
            .btn-google {
                font-size: 0.9rem;
                padding: 13px;
            }

            .input-wrapper input {
                font-size: 0.88rem;
                padding: 13px 13px 13px 40px;
            }

            .input-wrapper .input-icon {
                left: 11px;
            }

            .input-wrapper .input-icon svg {
                width: 16px;
                height: 16px;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 24px 14px 20px;
                border-radius: 14px;
            }

            .login-header h1 {
                font-size: 1.3rem;
            }

            .login-header .icon-circle {
                width: 44px;
                height: 44px;
            }

            .login-header .icon-circle svg {
                width: 22px;
                height: 22px;
            }

            .input-wrapper input {
                font-size: 0.82rem;
                padding: 12px 12px 12px 36px;
            }

            .input-wrapper .input-icon {
                left: 10px;
            }

            .input-wrapper .input-icon svg {
                width: 15px;
                height: 15px;
            }

            .btn-login,
            .btn-google {
                font-size: 0.85rem;
                padding: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="icon-circle">
                    <!-- User / avatar icon -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" fill="none" stroke-width="2"/>
                        <circle cx="12" cy="9" r="3" stroke="currentColor" fill="none" stroke-width="2"/>
                        <path d="M5 20c0-3.5 3.1-6.5 7-6.5s7 3 7 6.5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Silakan login ke akun Anda</p>
            </div>

            <!-- Form -->
            <form id="loginForm" novalidate>
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- Envelope icon -->
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" fill="none" stroke-width="2"/>
                                <path d="M2 7l10 7 10-7" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <input type="email" id="email" placeholder="nama@email.com" autocomplete="email" />
                    </div>
                    <div class="error-message" id="emailError">
                        <!-- Alert circle icon -->
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" fill="#ff5e7a" stroke="none"/>
                            <line x1="12" y1="7" x2="12" y2="13" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                            <circle cx="12" cy="16.5" r="1.3" fill="#fff" stroke="none"/>
                        </svg>
                        <span>Email tidak boleh kosong</span>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- Lock icon -->
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <rect x="4" y="10" width="16" height="12" rx="2" stroke="currentColor" fill="none" stroke-width="2"/>
                                <path d="M7 10V7a5 5 0 0110 0v3" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" />
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Tampilkan password">
                            <!-- Eye icon -->
                            <svg id="eyeIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" fill="none" stroke-width="2"/>
                                <circle cx="12" cy="12" r="3" stroke="currentColor" fill="none" stroke-width="2"/>
                            </svg>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" fill="#ff5e7a" stroke="none"/>
                            <line x1="12" y1="7" x2="12" y2="13" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                            <circle cx="12" cy="16.5" r="1.3" fill="#fff" stroke="none"/>
                        </svg>
                        <span>Password tidak boleh kosong</span>
                    </div>
                </div>

                <!-- Remember me & Forgot password -->
                <div class="form-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" />
                        <span class="custom-checkbox">
                            <!-- Checkmark icon -->
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <polyline points="4 12 10 18 20 6" stroke="white" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        Remember Me
                    </label>
                    <a href="#" class="forgot-link">Lupa Password?</a>
                </div>

                <!-- Login button -->
                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="spinner"></span>
                    <span class="btn-text">Login</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>atau</span>
            </div>

            <!-- Google login -->
            <button type="button" class="btn-google" id="btnGoogle">
                <!-- Google "G" logo SVG -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="googleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#4285F4;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#34A853;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect x="1" y="1" width="22" height="22" rx="11" fill="white" stroke="none"/>
                    <path d="M19.5 12.14c0-.54-.05-1.07-.15-1.58H12v3h4.26c-.18.92-.72 1.7-1.52 2.24v1.86h2.46c1.44-1.32 2.3-3.26 2.3-5.52z" fill="#4285F4"/>
                    <path d="M12 20c2.06 0 3.8-.68 5.06-1.84l-2.46-1.86c-.68.46-1.54.73-2.6.73-2 0-3.7-1.36-4.3-3.2H5.28v1.9C6.54 17.96 9.06 20 12 20z" fill="#34A853"/>
                    <path d="M7.7 13.83c-.15-.46-.24-.95-.24-1.45s.09-.99.24-1.45v-1.9H5.28C4.46 10.36 4 11.36 4 12.38s.46 2.02 1.28 2.95l2.42-1.5z" fill="#FBBC05"/>
                    <path d="M12 7.55c1.12 0 2.12.39 2.92 1.15l2.18-2.18C15.8 5.1 14.06 4.38 12 4.38c-2.94 0-5.46 1.66-6.72 4.1l2.42 1.9c.6-1.84 2.3-2.83 4.3-2.83z" fill="#EA4335"/>
                </svg>
                Login dengan Google
            </button>

            <!-- Footer -->
            <div class="login-footer">
                Belum punya akun? <a href="#">Daftar</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM Elements
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const btnLogin = document.getElementById('btnLogin');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const eyeIcon = document.getElementById('eyeIcon');
            const btnGoogle = document.getElementById('btnGoogle');

            // --- Toggle Show/Hide Password ---
            let passwordVisible = false;

            togglePasswordBtn.addEventListener('click', function(e) {
                e.preventDefault();
                passwordVisible = !passwordVisible;

                if (passwordVisible) {
                    passwordInput.type = 'text';
                    // Change to eye-off icon
                    eyeIcon.innerHTML = `
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            `;
                    togglePasswordBtn.setAttribute('aria-label', 'Sembunyikan password');
                } else {
                    passwordInput.type = 'password';
                    // Change back to eye icon
                    eyeIcon.innerHTML = `
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" fill="none" stroke-width="2"/>
                                <circle cx="12" cy="12" r="3" stroke="currentColor" fill="none" stroke-width="2"/>
                            `;
                    togglePasswordBtn.setAttribute('aria-label', 'Tampilkan password');
                }
            });

            // --- Hide error on input ---
            emailInput.addEventListener('input', function() {
                if (emailError.classList.contains('visible')) {
                    emailError.classList.remove('visible');
                }
                // Reset border style if needed
                emailInput.style.borderColor = '';
            });

            passwordInput.addEventListener('input', function() {
                if (passwordError.classList.contains('visible')) {
                    passwordError.classList.remove('visible');
                }
                passwordInput.style.borderColor = '';
            });

            // --- Form Submission ---
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();

                // Reset all errors
                emailError.classList.remove('visible');
                passwordError.classList.remove('visible');
                emailInput.style.borderColor = '';
                passwordInput.style.borderColor = '';

                let hasError = false;

                // Validate email
                const emailValue = emailInput.value.trim();
                if (!emailValue) {
                    emailError.classList.add('visible');
                    emailInput.style.borderColor = '#ff5e7a';
                    emailInput.focus();
                    hasError = true;
                } else if (!isValidEmail(emailValue)) {
                    emailError.querySelector('span').textContent =
                        'Format email tidak valid';
                    emailError.classList.add('visible');
                    emailInput.style.borderColor = '#ff5e7a';
                    emailInput.focus();
                    hasError = true;
                } else {
                    emailError.querySelector('span').textContent = 'Email tidak boleh kosong';
                }

                // Validate password
                const passwordValue = passwordInput.value;
                if (!passwordValue) {
                    passwordError.classList.add('visible');
                    passwordInput.style.borderColor = '#ff5e7a';
                    if (!hasError) {
                        passwordInput.focus();
                    }
                    hasError = true;
                }

                if (hasError) {
                    return;
                }

                // Simulate loading
                btnLogin.classList.add('loading');
                btnLogin.disabled = true;

                // Simulate API call (1.8 seconds)
                setTimeout(function() {
                    btnLogin.classList.remove('loading');
                    btnLogin.disabled = false;

                    // Show success alert (simulasi berhasil login)
                    showToast('Login berhasil! Selamat datang kembali.', 'success');

                    // Optional: reset form
                    // loginForm.reset();
                }, 1800);
            });

            // --- Google Button ---
            btnGoogle.addEventListener('click', function() {
                // Simulate Google login loading
                const originalHTML = btnGoogle.innerHTML;
                btnGoogle.innerHTML = `
                            <span style="display:inline-block;width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;"></span>
                            Menghubungkan...
                        `;
                btnGoogle.disabled = true;
                btnGoogle.style.pointerEvents = 'none';
                btnGoogle.style.opacity = '0.8';

                setTimeout(function() {
                    btnGoogle.innerHTML = originalHTML;
                    btnGoogle.disabled = false;
                    btnGoogle.style.pointerEvents = '';
                    btnGoogle.style.opacity = '';
                    showToast('Login dengan Google berhasil!', 'success');
                }, 1500);
            });

            // --- Forgot Password Link ---
            const forgotLink = document.querySelector('.forgot-link');
            forgotLink.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('Link reset password telah dikirim ke email Anda (simulasi).', 'info');
            });

            // --- Daftar Link ---
            const daftarLink = document.querySelector('.login-footer a');
            daftarLink.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('Mengarahkan ke halaman pendaftaran... (simulasi)', 'info');
            });

            // --- Helper: Email validation ---
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            // --- Helper: Toast notification ---
            function showToast(message, type) {
                // Remove existing toast
                const existingToast = document.querySelector('.custom-toast');
                if (existingToast) {
                    existingToast.remove();
                }

                const toast = document.createElement('div');
                toast.className = 'custom-toast';
                toast.textContent = message;
                toast.style.cssText = `
                            position: fixed;
                            bottom: 30px;
                            left: 50%;
                            transform: translateX(-50%) translateY(20px);
                            background: ${type === 'success' ? '#2ecc71' : type === 'info' ? '#4f6ef6' : '#ff5e7a'};
                            color: #fff;
                            padding: 14px 24px;
                            border-radius: 30px;
                            font-family: 'Poppins', sans-serif;
                            font-size: 0.9rem;
                            font-weight: 500;
                            z-index: 9999;
                            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
                            letter-spacing: 0.2px;
                            opacity: 0;
                            transition: all 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
                            pointer-events: none;
                            white-space: nowrap;
                            max-width: 90vw;
                            text-align: center;
                        `;

                document.body.appendChild(toast);

                // Trigger animation
                requestAnimationFrame(function() {
                    toast.style.opacity = '1';
                    toast.style.transform = 'translateX(-50%) translateY(0)';
                });

                // Auto remove after 3 seconds
                setTimeout(function() {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(-50%) translateY(20px)';
                    setTimeout(function() {
                        if (toast.parentNode) {
                            toast.remove();
                        }
                    }, 400);
                }, 3000);
            }

            // --- Add spin keyframe dynamically for Google button spinner ---
            const styleSheet = document.createElement('style');
            styleSheet.textContent = `
                        @keyframes spin {
                            to { transform: rotate(360deg); }
                        }
                    `;
            document.head.appendChild(styleSheet);

            console.log('✨ Halaman login siap!');
            console.log('   Desain: Glassmorphism Modern');
            console.log('   Fitur: Validasi, Show/Hide Password, Loading State, Responsif');
            console.log('   Dibuat dengan pure HTML + CSS + JavaScript');
        })();
    </script>
</body>
</html>
