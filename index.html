<!-- index.html -->
<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SMA Harapan Bangsa</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-body">
    <div class="auth-overlay">
      <div class="auth-container">
        <div class="auth-header">
          <div class="logo">SMA <span>Harapan Bangsa</span></div>
          <h2 id="form-title">Selamat Datang</h2>
          <p id="form-subtitle">Silakan masuk ke akun akademik Anda</p>
        </div>

        <form id="auth-form">
          <div class="input-group">
            <input type="text" id="username" placeholder="Username" required />
          </div>
          <div class="input-group">
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
          </div>
          <button type="submit" class="btn btn-login">Login</button>
        </form>

        <p id="toggle-text">
          Belum punya akun?
          <a href="#" onclick="toggleForm()">Daftar Sekarang</a>
        </p>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
